<!--
  hud_capsule_9slice.svg — v3 HUD Capsule design reference
  Size: 128×48 px  |  Shape: stadium/pill (radius = 24)
  Slice: left=24, right=24 (horizontal only — fully rounded ends)

  DESIGN REFERENCE ONLY — NOT loaded at runtime.
  Runtime rendering uses Phaser Graphics via createHudCapsuleV3().

  Material: Obsidian Glass + Teal Rim v3 (muted variant)
    Fill:        #07090f  (panelFill)
    Rim:         #48c8d8 @ 0.65 alpha (rimAlpha.muted)
    Outer glow:  #48c8d8 @ 0.14 alpha, 6px wide stroke
    Inner highlight: rgba(255,255,255,0.05) at top strip
    Shadow:      #000000 @ 0.32 alpha, offset (1, 2)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="48" viewBox="0 0 128 48">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <!-- Outer glow stroke (dim teal, 6 px spread over the 2 px rim) -->
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.282  0 0 0 0 0.784  0 0 0 0 0.847  0 0 0 0.14 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <!-- 1. Drop shadow -->
  <rect x="1" y="2" width="128" height="48" rx="24" ry="24"
        fill="#000000" fill-opacity="0.32"/>

  <!-- 2. Outer glow (wide dim teal stroke) -->
  <rect x="0" y="0" width="128" height="48" rx="24" ry="24"
        fill="none"
        stroke="#48c8d8" stroke-width="8" stroke-opacity="0.14"/>

  <!-- 3. Obsidian fill -->
  <rect x="0" y="0" width="128" height="48" rx="24" ry="24"
        fill="#07090f" fill-opacity="0.92"/>

  <!-- 4. Inner top highlight strip (top 7px = min(48*0.15, 6) ≈ 6px, rounded top) -->
  <rect x="0" y="0" width="128" height="6" rx="24" ry="24"
        fill="#ffffff" fill-opacity="0.05"/>

  <!-- 5. Teal rim (muted, 2px, 0.65 alpha) -->
  <rect x="1" y="1" width="126" height="46" rx="23" ry="23"
        fill="none"
        stroke="#48c8d8" stroke-width="2" stroke-opacity="0.65"/>
</svg>
