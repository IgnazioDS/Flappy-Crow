<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    icon_share.svg — Upload / share arrow.
    Arrow pointing up from a tray. Same textPrimary palette.
  -->
  <!-- Tray base -->
  <rect x="4" y="17" width="16" height="3" rx="1"
        fill="#d7f5ff" opacity="0.90"/>
  <!-- Arrow shaft -->
  <line x1="12" y1="15" x2="12" y2="5"
        stroke="#d7f5ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="8,9 12,5 16,9"
            fill="none" stroke="#d7f5ff" stroke-width="2"
            stroke-linejoin="round" stroke-linecap="round"/>
</svg>
