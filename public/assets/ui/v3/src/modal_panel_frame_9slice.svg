<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    modal_panel_frame_9slice.svg — Border frame only (TRANSPARENT fill).
    Loaded at runtime as 'ui_v3_panel_frame'; used as NineSlice overlay
    on top of the canvas gradient fill to provide crisp teal rim corners.
    9-slice borders: 16px on every side.
    RGB=0 where alpha=0.
  -->
  <defs>
    <filter id="rimGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Outer glow (wide dim teal, transparent fill → RGB=0) -->
  <rect x="1" y="1" width="126" height="126" rx="14" ry="14"
        fill="none" stroke="#000048" stroke-width="6" opacity="0"
        filter="url(#rimGlow)"/>
  <!-- Visible glow layer — no fill -->
  <rect x="1" y="1" width="126" height="126" rx="14" ry="14"
        fill="none" stroke="#48c8d8" stroke-width="6" opacity="0.14"/>

  <!-- 2. Inner top-edge highlight (white, very subtle, top strip only) -->
  <rect x="3" y="3" width="122" height="8" rx="12" ry="12"
        fill="#ffffff" opacity="0.05"/>

  <!-- 3. Teal rim stroke (main, crisp 1.5px) -->
  <rect x="2" y="2" width="124" height="124" rx="13" ry="13"
        fill="none" stroke="#48c8d8" stroke-width="1.5" opacity="0.72"/>
</svg>
