<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" width="80" height="32">
  <!--
    chip_9slice.svg — Value chip (OFF / FULL / ASK / ON / …)
    Horizontal-only 9-slice: left=16, right=16, top=0, bottom=0.
    Dark fill, teal rim, radius=6. Designed at neutral tone.
    Runtime tinting via DT_BADGE alpha overrides per tone (on/off/neutral).
    RGB=0 where alpha=0.
  -->

  <!-- Drop shadow -->
  <rect x="2" y="3" width="78" height="28" rx="6" ry="6"
        fill="#000000" opacity="0.35"/>

  <!-- Chip fill (dark obsidian at neutral alpha 0.22) -->
  <rect x="1" y="1" width="78" height="30" rx="6" ry="6"
        fill="#07090f" opacity="0.22"/>

  <!-- Teal rim stroke (neutral alpha 0.55) -->
  <rect x="1" y="1" width="78" height="30" rx="6" ry="6"
        fill="none" stroke="#48c8d8" stroke-width="1" opacity="0.55"/>
</svg>
