<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    icon_home.svg — Home / house icon.
    Palette: #d7f5ff (textPrimary) — crisp geometric silhouette.
    Optimised for 24×24 and 48×48 (2×) display.
  -->
  <!-- Roof (triangle) -->
  <polygon points="12,3 22,11 19,11 19,21 5,21 5,11 2,11"
           fill="none" stroke="#d7f5ff" stroke-width="1.8"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Door -->
  <rect x="9" y="15" width="6" height="6"
        fill="#d7f5ff" opacity="0.85" rx="0.5"/>
</svg>
