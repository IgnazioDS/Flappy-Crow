<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" width="48" height="56">
  <!-- Bronze medal — consistent style across medal set -->

  <!-- Ribbon top -->
  <path d="M16 0 L24 8 L32 0 L32 16 L16 16 Z" fill="#8b5e3c" opacity="0.9"/>
  <line x1="24" y1="0" x2="24" y2="16" stroke="#a0714f" stroke-width="1.5" opacity="0.6"/>

  <!-- Medal disc shadow -->
  <circle cx="25" cy="38" r="18" fill="#000000" opacity="0.35"/>

  <!-- Medal disc -->
  <circle cx="24" cy="36" r="18" fill="#c47c3a"/>

  <!-- Rim highlight -->
  <circle cx="24" cy="36" r="18" fill="none" stroke="#e8a862" stroke-width="2" opacity="0.7"/>

  <!-- Inner circle -->
  <circle cx="24" cy="36" r="13" fill="#b06e30" opacity="0.8"/>

  <!-- "I" or podium glyph — bronze = 3rd -->
  <text x="24" y="41" font-family="'Cinzel', serif" font-size="14" font-weight="700"
        fill="#f0d0a0" text-anchor="middle" opacity="0.95">III</text>
</svg>
