<svg xmlns="http://www.w3.org/2000/svg" width="60" height="400" viewBox="0 0 60 400">
  <!--
    Emerald theme — pipe/obstacle. 60×400.
    Dark teal crystal-stone column with bright jade highlight stripe,
    teal rim glow, and deep shadow edge.
  -->
  <defs>
    <linearGradient id="shaft-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0e4838"/>
      <stop offset="18%"  stop-color="#28b890"/>
      <stop offset="50%"  stop-color="#1e9870"/>
      <stop offset="82%"  stop-color="#0c5838"/>
      <stop offset="100%" stop-color="#083020"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a3828"/>
      <stop offset="20%"  stop-color="#24a878"/>
      <stop offset="50%"  stop-color="#2cc888"/>
      <stop offset="80%"  stop-color="#168858"/>
      <stop offset="100%" stop-color="#082818"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#88f8d8" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#88f8d8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shadow-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#031808" stop-opacity="0"/>
      <stop offset="100%" stop-color="#031808" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- Shaft -->
  <rect x="3" y="28" width="54" height="372" fill="url(#shaft-grad)"/>
  <!-- Highlight stripe -->
  <rect x="7" y="28" width="11" height="372" fill="url(#highlight)" rx="3"/>
  <!-- Right shadow -->
  <rect x="38" y="28" width="19" height="372" fill="url(#shadow-r)"/>

  <!-- Teal rim glow along shaft edge -->
  <line x1="3" y1="28" x2="3" y2="400" stroke="#48c8d8" stroke-width="1.2" opacity="0.3"/>
  <line x1="57" y1="28" x2="57" y2="400" stroke="#48c8d8" stroke-width="1.2" opacity="0.2"/>

  <!-- Cap -->
  <rect x="0" y="0" width="60" height="28" rx="5" fill="url(#cap-grad)"/>
  <!-- Cap highlight -->
  <rect x="4" y="2" width="16" height="14" rx="4" fill="#c0fff0" opacity="0.55"/>
  <!-- Cap right shadow -->
  <rect x="44" y="0" width="16" height="28" rx="5" fill="#031808" opacity="0.32"/>
  <!-- Cap bottom edge + teal glow -->
  <line x1="0" y1="27.5" x2="60" y2="27.5" stroke="#48c8d8" stroke-width="1.2" opacity="0.5"/>
</svg>
