<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640" fill="none">
  <!--
    Classic theme — mid background. 360×640.
    Distant rolling hills, fuller cloud masses, atmospheric depth.
    Cooler blue-grey at distance, lighter as sky meets ground.
  -->
  <defs>
    <linearGradient id="hill-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c2d8f0"/>
      <stop offset="100%" stop-color="#a8c8e8"/>
    </linearGradient>
    <linearGradient id="hill-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a0c0e0"/>
      <stop offset="100%" stop-color="#88b0d8"/>
    </linearGradient>
    <linearGradient id="cloud-shad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b8d4f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b8d4f0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Transparent base (sky shows through) -->
  <rect width="360" height="640" fill="none"/>

  <!-- Distant hill ridge 1 — very pale, atmospheric perspective -->
  <path d="M-20 310 C40 268 120 256 180 270 C240 284 300 272 380 288 L380 640 L-20 640 Z"
        fill="url(#hill-far)" opacity="0.55"/>

  <!-- Distant hill ridge 2 — slightly closer -->
  <path d="M-20 360 C50 328 130 320 200 340 C270 358 320 348 380 340 L380 640 L-20 640 Z"
        fill="url(#hill-mid)" opacity="0.60"/>

  <!-- Cloud shadow/base layers -->
  <ellipse cx="110" cy="215" rx="90" ry="28" fill="url(#cloud-shad)"/>
  <ellipse cx="264" cy="240" rx="110" ry="30" fill="url(#cloud-shad)"/>

  <!-- Volumetric cloud bodies -->
  <ellipse cx="90"  cy="198" rx="82" ry="26" fill="#ffffff" opacity="0.35"/>
  <ellipse cx="74"  cy="186" rx="52" ry="20" fill="#ffffff" opacity="0.25"/>
  <ellipse cx="110" cy="208" rx="60" ry="22" fill="#ffffff" opacity="0.20"/>
  <ellipse cx="132" cy="200" rx="40" ry="16" fill="#ffffff" opacity="0.15"/>

  <ellipse cx="256" cy="228" rx="100" ry="28" fill="#ffffff" opacity="0.32"/>
  <ellipse cx="232" cy="216" rx="64"  ry="20" fill="#ffffff" opacity="0.22"/>
  <ellipse cx="278" cy="236" rx="72"  ry="22" fill="#ffffff" opacity="0.18"/>
  <ellipse cx="302" cy="220" rx="44"  ry="16" fill="#ffffff" opacity="0.14"/>

  <!-- Small wisp cloud -->
  <ellipse cx="172" cy="175" rx="54" ry="14" fill="#ffffff" opacity="0.20"/>
  <ellipse cx="160" cy="168" rx="32" ry="10" fill="#ffffff" opacity="0.15"/>
</svg>
