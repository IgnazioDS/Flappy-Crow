<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640" fill="none">
  <!--
    Evil Forest — mid background. 360×640.
    Mid-range dead trees with gnarled branches, wisps of spectral light,
    draping cobweb suggestions. Deep obsidian-violet base.
  -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#151022"/>
      <stop offset="100%" stop-color="#0e0c1a"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6b5c9a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6b5c9a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="360" height="640" fill="url(#base)"/>

  <!-- Trunks — wider, more organic shape -->
  <path d="M24 152 L52 152 L60 290 L48 460 L56 640 L20 640 L28 430 L18 270 Z"
        fill="#201838" opacity="0.85"/>
  <path d="M92 182 L118 182 L126 312 L114 475 L122 640 L86 640 L94 445 L84 290 Z"
        fill="#201838" opacity="0.80"/>
  <path d="M164 142 L194 142 L202 302 L190 465 L198 640 L154 640 L162 445 L152 272 Z"
        fill="#221a3a" opacity="0.88"/>
  <path d="M232 172 L258 172 L266 312 L254 482 L262 640 L220 640 L228 432 L218 290 Z"
        fill="#201838" opacity="0.82"/>
  <path d="M300 132 L326 132 L334 282 L322 445 L330 640 L292 640 L300 432 L290 252 Z"
        fill="#201838" opacity="0.85"/>

  <!-- Gnarled branch forks -->
  <path d="M38 208 L10 186"  stroke="#3a2852" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M38 208 L64 188"  stroke="#3a2852" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <path d="M108 248 L144 222" stroke="#3a2852" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M108 248 L76 226"  stroke="#3a2852" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <path d="M188 228 L222 202" stroke="#3a2852" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M188 228 L158 208" stroke="#3a2852" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <path d="M250 268 L216 240" stroke="#3a2852" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M250 268 L278 244" stroke="#3a2852" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <path d="M320 218 L348 190" stroke="#3a2852" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M320 218 L296 196" stroke="#3a2852" stroke-width="5" stroke-linecap="round" opacity="0.65"/>

  <!-- Secondary branch sub-forks -->
  <path d="M10 186  L2  174"  stroke="#2e2046" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <path d="M64 188  L74 175"  stroke="#2e2046" stroke-width="3" stroke-linecap="round" opacity="0.50"/>
  <path d="M144 222 L152 208" stroke="#2e2046" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <path d="M222 202 L230 190" stroke="#2e2046" stroke-width="3" stroke-linecap="round" opacity="0.50"/>
  <path d="M348 190 L356 177" stroke="#2e2046" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Spectral wisps / fog pockets -->
  <ellipse cx="90"  cy="315" rx="120" ry="38" fill="url(#mist)"/>
  <ellipse cx="260" cy="370" rx="150" ry="44" fill="url(#mist)"/>
  <ellipse cx="138" cy="480" rx="160" ry="48" fill="url(#mist)" opacity="0.7"/>
</svg>
