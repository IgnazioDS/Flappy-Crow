<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160" viewBox="0 0 360 160" fill="none">
  <!--
    Evil Forest — fog tile. 360×160. Tiling horizontal fog strip.
    Soft violet-grey mist with subtle bloom pockets. Transparent above,
    heavier below — blends into scene as ADD/NORMAL layer.
  -->
  <defs>
    <linearGradient id="fog-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9880c8" stop-opacity="0.00"/>
      <stop offset="35%"  stop-color="#8870b8" stop-opacity="0.12"/>
      <stop offset="75%"  stop-color="#7865a8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6858a0" stop-opacity="0.28"/>
    </linearGradient>
    <radialGradient id="wisp1" cx="20%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#b0a0d8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b0a0d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wisp2" cx="60%" cy="55%" r="40%">
      <stop offset="0%"   stop-color="#c0b0e0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c0b0e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wisp3" cx="90%" cy="48%" r="32%">
      <stop offset="0%"   stop-color="#a898cc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a898cc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="360" height="160" fill="url(#fog-base)"/>
  <ellipse cx="72"  cy="80"  rx="96"  ry="44" fill="url(#wisp1)"/>
  <ellipse cx="216" cy="88"  rx="130" ry="52" fill="url(#wisp2)"/>
  <ellipse cx="324" cy="77"  rx="88"  ry="40" fill="url(#wisp3)"/>
</svg>
