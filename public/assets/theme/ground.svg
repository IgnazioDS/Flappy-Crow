<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80" fill="none">
  <!--
    Evil Forest — ground strip. 360×80.
    Dark swamp earth: near-transparent top blending into deep obsidian.
    Irregular bank silhouette, dark root streaks.
  -->
  <defs>
    <linearGradient id="ground-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#122036" stop-opacity="0.00"/>
      <stop offset="22%"  stop-color="#122036" stop-opacity="0.38"/>
      <stop offset="58%"  stop-color="#0e182a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#080e1c" stop-opacity="0.99"/>
    </linearGradient>
    <linearGradient id="ground-tint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2a3f5a" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#304c68" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#27394f" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <rect width="360" height="80" fill="url(#ground-base)"/>

  <!-- Irregular bank silhouette -->
  <path d="M0 28 L16 30 L34 27 L52 31 L70 29 L88 34 L106 31 L124 36 L142 33 L160 38 L178 35 L196 39 L214 36 L232 40 L250 37 L268 41 L286 38 L304 43 L322 40 L340 45 L360 42 L360 80 L0 80 Z"
        fill="#0e1828" opacity="0.92"/>
  <path d="M0 36 L22 39 L46 36 L68 41 L90 38 L114 43 L138 40 L162 45 L186 42 L208 47 L232 44 L256 49 L280 46 L304 51 L332 48 L360 52 L360 80 L0 80 Z"
        fill="url(#ground-tint)"/>

  <!-- Root streaks -->
  <path d="M24 34 L16 60"  stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.58"/>
  <path d="M60 36 L52 66"  stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M98 38 L90 70"  stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M136 40 L126 72" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.52"/>
  <path d="M176 42 L164 74" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M216 44 L204 74" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.52"/>
  <path d="M256 46 L244 76" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.52"/>
  <path d="M296 48 L284 76" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.50"/>
  <path d="M334 50 L322 74" stroke="#1a2a3e" stroke-width="2" stroke-linecap="round" opacity="0.48"/>
</svg>
