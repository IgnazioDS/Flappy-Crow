<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640" fill="none">
  <!--
    Evil Forest — far background. 360×640.
    Deep violet-black sky, sickly moon, spectral haze, bare distant tree
    silhouettes stitched against the night horizon.
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#14102a"/>
      <stop offset="35%"  stop-color="#1a1230"/>
      <stop offset="70%"  stop-color="#1e1535"/>
      <stop offset="100%" stop-color="#130e22"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="30%" cy="15%" r="28%">
      <stop offset="0%"   stop-color="#c0d8e8" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#8090a8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4a5870" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon-mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a2a5a" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#3a2a5a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2a1e48" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="360" height="640" fill="url(#sky)"/>

  <!-- Moon bloom and disc -->
  <ellipse cx="108" cy="96" rx="88" ry="88" fill="url(#moon-glow)"/>
  <circle cx="110" cy="94" r="20" fill="#dde8f0" opacity="0.75"/>
  <circle cx="114" cy="90" r="15" fill="#c8d8e4" opacity="0.60"/>
  <!-- Moon crater hints -->
  <circle cx="106" cy="96" r="4" fill="#b8ccd8" opacity="0.30"/>
  <circle cx="116" cy="88" r="2.5" fill="#b8ccd8" opacity="0.25"/>

  <!-- Horizon mist -->
  <rect y="450" width="360" height="190" fill="url(#horizon-mist)"/>

  <!-- Star field -->
  <circle cx="38"  cy="50"  r="0.8" fill="#c8d0e8" opacity="0.65"/>
  <circle cx="72"  cy="28"  r="0.7" fill="#d8e0f0" opacity="0.60"/>
  <circle cx="148" cy="42"  r="0.9" fill="#c8d0e8" opacity="0.55"/>
  <circle cx="192" cy="18"  r="0.7" fill="#d8e0f0" opacity="0.60"/>
  <circle cx="230" cy="55"  r="0.8" fill="#c8d0e8" opacity="0.55"/>
  <circle cx="276" cy="32"  r="0.6" fill="#d8e0f0" opacity="0.50"/>
  <circle cx="318" cy="68"  r="0.9" fill="#c8d0e8" opacity="0.55"/>
  <circle cx="344" cy="22"  r="0.6" fill="#d8e0f0" opacity="0.50"/>
  <circle cx="58"  cy="130" r="0.6" fill="#c8d0e8" opacity="0.40"/>
  <circle cx="200" cy="118" r="0.7" fill="#d8e0f0" opacity="0.40"/>
  <circle cx="292" cy="105" r="0.6" fill="#c8d0e8" opacity="0.38"/>

  <!-- Distant dead tree silhouettes — very thin, ghostly -->
  <rect x="20"  y="120" width="4"  height="260" fill="#1e1835" opacity="0.55"/>
  <rect x="62"  y="138" width="3"  height="240" fill="#1e1835" opacity="0.50"/>
  <rect x="106" y="112" width="5"  height="280" fill="#1e1835" opacity="0.55"/>
  <rect x="165" y="128" width="4"  height="252" fill="#1e1835" opacity="0.48"/>
  <rect x="218" y="100" width="5"  height="290" fill="#1e1835" opacity="0.52"/>
  <rect x="268" y="125" width="4"  height="264" fill="#1e1835" opacity="0.48"/>
  <rect x="310" y="114" width="4"  height="274" fill="#1e1835" opacity="0.50"/>
  <!-- Crown fork hints -->
  <line x1="22"  y1="145" x2="10"  y2="125" stroke="#1e1835" stroke-width="2" opacity="0.45"/>
  <line x1="22"  y1="145" x2="32"  y2="122" stroke="#1e1835" stroke-width="2" opacity="0.45"/>
  <line x1="108" y1="140" x2="98"  y2="118" stroke="#1e1835" stroke-width="2" opacity="0.45"/>
  <line x1="108" y1="140" x2="118" y2="114" stroke="#1e1835" stroke-width="2" opacity="0.45"/>
  <line x1="220" y1="130" x2="210" y2="106" stroke="#1e1835" stroke-width="2" opacity="0.45"/>
  <line x1="220" y1="130" x2="232" y2="102" stroke="#1e1835" stroke-width="2" opacity="0.42"/>

  <!-- Spectral haze wisps -->
  <ellipse cx="68"  cy="240" rx="90"  ry="22" fill="#4a3875" opacity="0.10"/>
  <ellipse cx="238" cy="272" rx="120" ry="28" fill="#4a3875" opacity="0.09"/>
  <ellipse cx="142" cy="358" rx="140" ry="34" fill="#3a2e68" opacity="0.08"/>
  <ellipse cx="295" cy="440" rx="110" ry="30" fill="#3a2e68" opacity="0.08"/>
</svg>
