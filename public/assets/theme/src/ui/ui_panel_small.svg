<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120">
  <!--
    UI Panel Small — 280×120. Obsidian glass with teal rim.
    Used for settings / smaller overlays in atlas row 2.
  -->
  <defs>
    <linearGradient id="panel-fill" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#0d1020" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="top-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="4" y="5" width="272" height="112" rx="14" fill="#000000" opacity="0.45"/>

  <!-- Main panel -->
  <rect x="2" y="2" width="276" height="116" rx="12" fill="url(#panel-fill)"/>

  <!-- Top sheen -->
  <rect x="2" y="2" width="276" height="46" rx="12" fill="url(#top-sheen)"/>

  <!-- Teal rim -->
  <rect x="2" y="2" width="276" height="116" rx="12"
        fill="none" stroke="#48c8d8" stroke-width="1.5" opacity="0.80"/>

  <!-- Inner rim accent -->
  <rect x="4" y="4" width="272" height="112" rx="10"
        fill="none" stroke="#9ef1ff" stroke-width="0.75" opacity="0.18"/>
</svg>
