<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <!--
    UI Panel Large — 320×180. Obsidian glass with teal rim.
    Used for GAME OVER / READY overlays in atlas row 2.
  -->
  <defs>
    <linearGradient id="panel-fill" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#0d1020" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="top-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="4" y="6" width="312" height="170" rx="14" fill="#000000" opacity="0.45"/>

  <!-- Main panel -->
  <rect x="2" y="2" width="316" height="174" rx="12" fill="url(#panel-fill)"/>

  <!-- Top sheen (glass highlight) -->
  <rect x="2" y="2" width="316" height="60" rx="12" fill="url(#top-sheen)"/>

  <!-- Teal rim -->
  <rect x="2" y="2" width="316" height="174" rx="12"
        fill="none" stroke="#48c8d8" stroke-width="1.5" opacity="0.80"/>

  <!-- Inner rim accent (faint second line) -->
  <rect x="4" y="4" width="312" height="170" rx="10"
        fill="none" stroke="#9ef1ff" stroke-width="0.75" opacity="0.18"/>
</svg>
