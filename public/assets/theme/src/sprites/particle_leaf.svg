<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!--
    Particle — leaf. 16×16.
    Stylised single leaf — dark teal-green with vein line.
    Rotated in-game during animation.
  -->
  <defs>
    <linearGradient id="leaf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e5040"/>
      <stop offset="100%" stop-color="#0d2820"/>
    </linearGradient>
  </defs>
  <!-- Leaf body — teardrop shape -->
  <path d="M 8,2 Q 14,4 14,10 Q 14,14 8,15 Q 2,14 2,10 Q 2,4 8,2 Z"
        fill="url(#leaf-grad)" opacity="0.95"/>
  <!-- Centre vein -->
  <line x1="8" y1="3" x2="8" y2="14" stroke="#2a8060" stroke-width="0.8" opacity="0.6"/>
  <!-- Lateral vein hints -->
  <line x1="8" y1="7"  x2="12" y2="9"  stroke="#2a8060" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="7"  x2="4"  y2="9"  stroke="#2a8060" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="11" x2="12" y2="12" stroke="#2a8060" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="11" x2="4"  y2="12" stroke="#2a8060" stroke-width="0.5" opacity="0.3"/>
  <!-- Edge highlight -->
  <path d="M 8,2 Q 14,4 14,10" stroke="#48c8d8" stroke-width="0.7" fill="none" opacity="0.25"/>
</svg>
