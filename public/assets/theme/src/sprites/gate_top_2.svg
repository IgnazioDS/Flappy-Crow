<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" width="80" height="320">
  <!--
    Gate TOP — variant 2. Maximum teal-moss saturation, ancient/overgrown.
    Brightest rim glow, most drip coverage, staggered crack network.
  -->
  <defs>
    <linearGradient id="stone-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0f15"/>
      <stop offset="20%"  stop-color="#121824"/>
      <stop offset="50%"  stop-color="#1a2230"/>
      <stop offset="80%"  stop-color="#10161e"/>
      <stop offset="100%" stop-color="#080c12"/>
    </linearGradient>
    <linearGradient id="stone-edge-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stone-edge-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#263248"/>
      <stop offset="40%"  stop-color="#1c2838"/>
      <stop offset="100%" stop-color="#0e1424"/>
    </linearGradient>
    <linearGradient id="teal-moss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#48c8d8" stop-opacity="0.05"/>
      <stop offset="40%"  stop-color="#48c8d8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9ef1ff" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="4" y="0" width="72" height="296" fill="url(#stone-main)"/>
  <rect x="4" y="0" width="18" height="296" fill="url(#stone-edge-l)"/>
  <rect x="58" y="0" width="18" height="296" fill="url(#stone-edge-r)"/>
  <rect x="4" y="0" width="72" height="296" fill="url(#highlight)"/>
  <rect x="4" y="0" width="72" height="296" fill="url(#teal-moss)"/>

  <line x1="4" y1="40"  x2="76" y2="40"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="80"  x2="76" y2="80"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="120" x2="76" y2="120" stroke="#0a0d14" stroke-width="1.5" opacity="0.45"/>
  <line x1="4" y1="160" x2="76" y2="160" stroke="#0a0d14" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="200" x2="76" y2="200" stroke="#0a0d14" stroke-width="1.5" opacity="0.35"/>
  <line x1="4" y1="240" x2="76" y2="240" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>
  <line x1="4" y1="280" x2="76" y2="280" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>

  <!-- Three cracks — fully weathered -->
  <path d="M 20,5  Q 18,70  22,150 Q 20,220 21,280" stroke="#08090f" stroke-width="0.9" fill="none" opacity="0.5"/>
  <path d="M 46,15 Q 48,80  44,160"                  stroke="#08090f" stroke-width="0.7" fill="none" opacity="0.35"/>
  <path d="M 62,40 Q 64,110 61,190"                  stroke="#08090f" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Dense drip network -->
  <path d="M 8,258  Q 7,272 9,296"   stroke="#48c8d8" stroke-width="1.3" fill="none" opacity="0.45"/>
  <path d="M 18,264 Q 17,278 19,296" stroke="#9ef1ff" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 30,260 Q 29,274 31,296" stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 44,268 Q 43,282 45,296" stroke="#9ef1ff" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M 56,262 Q 55,276 57,296" stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 67,270 Q 67,284 68,296" stroke="#48c8d8" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Moss patches (subtle filled areas near bottom of shaft) -->
  <ellipse cx="24" cy="288" rx="8" ry="4" fill="#48c8d8" opacity="0.1"/>
  <ellipse cx="56" cy="284" rx="6" ry="3" fill="#9ef1ff" opacity="0.08"/>

  <!-- Cap -->
  <rect x="0" y="296" width="80" height="24" rx="2" fill="url(#cap-grad)"/>
  <rect x="0" y="296" width="80" height="3" fill="#ffffff" opacity="0.08"/>
  <rect x="0"  y="296" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="74" y="296" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="0" y="316" width="80" height="4" fill="#48c8d8" opacity="0.35"/>
  <rect x="0" y="318" width="80" height="2" fill="#9ef1ff" opacity="0.25"/>
  <line x1="0" y1="304" x2="80" y2="304" stroke="#0d1220" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="312" x2="80" y2="312" stroke="#0d1220" stroke-width="1" opacity="0.4"/>
</svg>
