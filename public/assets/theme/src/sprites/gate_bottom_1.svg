<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" width="80" height="320">
  <!--
    Gate BOTTOM — variant 1. Heavier teal-moss than variant 0.
  -->
  <defs>
    <linearGradient id="stone-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0c1016"/>
      <stop offset="20%"  stop-color="#141a26"/>
      <stop offset="50%"  stop-color="#1c2432"/>
      <stop offset="80%"  stop-color="#121820"/>
      <stop offset="100%" stop-color="#090d14"/>
    </linearGradient>
    <linearGradient id="stone-edge-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stone-edge-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1220"/>
      <stop offset="60%"  stop-color="#1a2234"/>
      <stop offset="100%" stop-color="#243040"/>
    </linearGradient>
    <linearGradient id="teal-moss" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#48c8d8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#48c8d8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#9ef1ff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Cap top -->
  <rect x="0" y="0" width="80" height="24" rx="2" fill="url(#cap-grad)"/>
  <rect x="0" y="0"  width="80" height="2" fill="#9ef1ff" opacity="0.2"/>
  <rect x="0" y="2"  width="80" height="4" fill="#48c8d8" opacity="0.3"/>
  <rect x="0"  y="0" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="74" y="0" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <line x1="0" y1="8"  x2="80" y2="8"  stroke="#0d1220" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="16" x2="80" y2="16" stroke="#0d1220" stroke-width="1" opacity="0.4"/>
  <rect x="0" y="21" width="80" height="3" fill="#ffffff" opacity="0.04"/>

  <rect x="4" y="24" width="72" height="296" fill="url(#stone-main)"/>
  <rect x="4" y="24" width="18" height="296" fill="url(#stone-edge-l)"/>
  <rect x="58" y="24" width="18" height="296" fill="url(#stone-edge-r)"/>
  <rect x="4" y="24" width="72" height="296" fill="url(#highlight)"/>
  <rect x="4" y="24" width="72" height="296" fill="url(#teal-moss)"/>

  <line x1="4" y1="64"  x2="76" y2="64"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="104" x2="76" y2="104" stroke="#0a0d14" stroke-width="1.5" opacity="0.45"/>
  <line x1="4" y1="144" x2="76" y2="144" stroke="#0a0d14" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="184" x2="76" y2="184" stroke="#0a0d14" stroke-width="1.5" opacity="0.35"/>
  <line x1="4" y1="224" x2="76" y2="224" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>
  <line x1="4" y1="264" x2="76" y2="264" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>

  <path d="M 32,40 Q 30,110 33,200 Q 31,270 32,310" stroke="#08090f" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M 54,50 Q 56,120 53,200"                  stroke="#08090f" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Drips from cap -->
  <path d="M 10,24 Q 9,40 11,56"   stroke="#48c8d8" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 24,24 Q 23,38 25,52"  stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.35"/>
  <path d="M 42,24 Q 41,40 43,54"  stroke="#9ef1ff" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 58,24 Q 57,38 59,52"  stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.35"/>
  <path d="M 68,24 Q 68,38 69,50"  stroke="#48c8d8" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
