<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" width="80" height="320">
  <!--
    Gate TOP — variant 1. Heavier teal-moss coverage than variant 0.
    Same silhouette; more drip trails and brighter rim glow.
  -->
  <defs>
    <linearGradient id="stone-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0c1016"/>
      <stop offset="20%"  stop-color="#141a26"/>
      <stop offset="50%"  stop-color="#1c2432"/>
      <stop offset="80%"  stop-color="#121820"/>
      <stop offset="100%" stop-color="#090d14"/>
    </linearGradient>
    <linearGradient id="stone-edge-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stone-edge-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#243040"/>
      <stop offset="40%"  stop-color="#1a2234"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="teal-moss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#48c8d8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#48c8d8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#9ef1ff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="4" y="0" width="72" height="296" fill="url(#stone-main)"/>
  <rect x="4" y="0" width="18" height="296" fill="url(#stone-edge-l)"/>
  <rect x="58" y="0" width="18" height="296" fill="url(#stone-edge-r)"/>
  <rect x="4" y="0" width="72" height="296" fill="url(#highlight)"/>
  <rect x="4" y="0" width="72" height="296" fill="url(#teal-moss)"/>

  <line x1="4" y1="40"  x2="76" y2="40"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="80"  x2="76" y2="80"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="120" x2="76" y2="120" stroke="#0a0d14" stroke-width="1.5" opacity="0.45"/>
  <line x1="4" y1="160" x2="76" y2="160" stroke="#0a0d14" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="200" x2="76" y2="200" stroke="#0a0d14" stroke-width="1.5" opacity="0.35"/>
  <line x1="4" y1="240" x2="76" y2="240" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>
  <line x1="4" y1="280" x2="76" y2="280" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>

  <!-- Dual vertical cracks — more weathered -->
  <path d="M 30,10 Q 28,60 31,130 Q 29,200 30,260" stroke="#08090f" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M 55,30 Q 57,90  54,160"                 stroke="#08090f" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- More drip trails -->
  <path d="M 10,265 Q 9,280 11,296"  stroke="#48c8d8" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 22,272 Q 21,284 23,296" stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.35"/>
  <path d="M 40,270 Q 39,282 41,296" stroke="#9ef1ff" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 57,268 Q 56,280 58,296" stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.35"/>
  <path d="M 68,274 Q 68,286 69,296" stroke="#48c8d8" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Cap -->
  <rect x="0" y="296" width="80" height="24" rx="2" fill="url(#cap-grad)"/>
  <rect x="0" y="296" width="80" height="3" fill="#ffffff" opacity="0.07"/>
  <rect x="0"  y="296" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="74" y="296" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="0" y="316" width="80" height="4" fill="#48c8d8" opacity="0.3"/>
  <rect x="0" y="318" width="80" height="2" fill="#9ef1ff" opacity="0.2"/>
  <line x1="0" y1="304" x2="80" y2="304" stroke="#0d1220" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="312" x2="80" y2="312" stroke="#0d1220" stroke-width="1" opacity="0.4"/>
</svg>
