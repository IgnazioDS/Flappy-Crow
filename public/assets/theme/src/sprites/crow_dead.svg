<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="96" height="64">
  <!--
    Crow — dead frame. Body pitched nose-down ~35°, one wing limp.
    X-eyes replace the glowing teal eye. Reduced wing spread.
  -->
  <defs>
    <linearGradient id="body-grad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#2a1f3d" stop-opacity="0.5"/>
      <stop offset="40%"  stop-color="#120e1c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0810" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3d2e58" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#120e1c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wing-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1e1530"/>
      <stop offset="100%" stop-color="#0f0b18"/>
    </linearGradient>
  </defs>

  <!-- Tail feathers — drooping, gravity-affected -->
  <path d="M 24,44 Q 10,56 6,62" stroke="#1a1528" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 22,46 Q 8,56 6,62"  stroke="#1a1528" stroke-width="4"   stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 24,48 Q 12,52 10,58" stroke="#1a1528" stroke-width="3"   stroke-linecap="round" fill="none" opacity="0.75"/>
  <ellipse cx="22" cy="48" rx="7" ry="4" fill="#0f0b18" transform="rotate(25,22,48)"/>

  <!-- Body — rotated nose-down ~35° -->
  <ellipse cx="46" cy="36" rx="26" ry="14" fill="url(#body-grad)" transform="rotate(25,46,36)"/>
  <ellipse cx="46" cy="30" rx="20" ry="7" fill="url(#sheen)" transform="rotate(25,46,30)"/>

  <!-- Limp wing — hanging loosely below the body -->
  <path d="M 38,44 Q 30,52 26,58 Q 34,58 44,54 Q 50,50 54,44 Q 46,44 38,44 Z"
        fill="url(#wing-grad)" opacity="0.9"/>
  <!-- A few limp feather tips -->
  <path d="M 28,57 Q 26,62 30,62" stroke="#1e1530" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 36,58 Q 35,63 40,62" stroke="#1e1530" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Neck + Head — nose-down tilt -->
  <path d="M 66,22 Q 70,16 76,14 Q 70,24 66,28 Z" fill="url(#body-grad)"/>
  <circle cx="76" cy="14" r="13" fill="url(#body-grad)"/>
  <ellipse cx="74" cy="9"  rx="7" ry="4" fill="#3d2e58" opacity="0.25"/>

  <!-- Beak — angled down -->
  <path d="M 86,11 L 95,6 L 88,18 Z"  fill="#2e2438"/>
  <path d="M 88,15 L 94,10 L 89,20 Z" fill="#241c30"/>
  <line x1="86" y1="11" x2="95" y2="6" stroke="#3d2e58" stroke-width="0.7" opacity="0.5"/>

  <!-- Eye — X / dead eyes (no glow, dull grey) -->
  <circle cx="79" cy="11" r="4.5" fill="#1a1220"/>
  <!-- X marks -->
  <line x1="76.5" y1="8.5"  x2="81.5" y2="13.5" stroke="#c0a0b0" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="81.5" y1="8.5"  x2="76.5" y2="13.5" stroke="#c0a0b0" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Faint outer ring for readability -->
  <circle cx="79" cy="11" r="4.5" fill="none" stroke="#2a1f40" stroke-width="0.8" opacity="0.6"/>
</svg>
