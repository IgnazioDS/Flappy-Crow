<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" width="80" height="320">
  <!--
    Gate BOTTOM — variant 2. Maximum moss saturation, ancient/overgrown.
  -->
  <defs>
    <linearGradient id="stone-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0f15"/>
      <stop offset="20%"  stop-color="#121824"/>
      <stop offset="50%"  stop-color="#1a2230"/>
      <stop offset="80%"  stop-color="#10161e"/>
      <stop offset="100%" stop-color="#080c12"/>
    </linearGradient>
    <linearGradient id="stone-edge-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stone-edge-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0d14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1424"/>
      <stop offset="60%"  stop-color="#1c2838"/>
      <stop offset="100%" stop-color="#263248"/>
    </linearGradient>
    <linearGradient id="teal-moss" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#48c8d8" stop-opacity="0.05"/>
      <stop offset="40%"  stop-color="#48c8d8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9ef1ff" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Cap top -->
  <rect x="0" y="0" width="80" height="24" rx="2" fill="url(#cap-grad)"/>
  <rect x="0" y="0"  width="80" height="2" fill="#9ef1ff" opacity="0.25"/>
  <rect x="0" y="2"  width="80" height="4" fill="#48c8d8" opacity="0.35"/>
  <rect x="0"  y="0" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <rect x="74" y="0" width="6"  height="24" fill="#07090f" opacity="0.6"/>
  <line x1="0" y1="8"  x2="80" y2="8"  stroke="#0d1220" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="16" x2="80" y2="16" stroke="#0d1220" stroke-width="1" opacity="0.4"/>

  <rect x="4" y="24" width="72" height="296" fill="url(#stone-main)"/>
  <rect x="4" y="24" width="18" height="296" fill="url(#stone-edge-l)"/>
  <rect x="58" y="24" width="18" height="296" fill="url(#stone-edge-r)"/>
  <rect x="4" y="24" width="72" height="296" fill="url(#highlight)"/>
  <rect x="4" y="24" width="72" height="296" fill="url(#teal-moss)"/>

  <line x1="4" y1="64"  x2="76" y2="64"  stroke="#0a0d14" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="104" x2="76" y2="104" stroke="#0a0d14" stroke-width="1.5" opacity="0.45"/>
  <line x1="4" y1="144" x2="76" y2="144" stroke="#0a0d14" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="184" x2="76" y2="184" stroke="#0a0d14" stroke-width="1.5" opacity="0.35"/>
  <line x1="4" y1="224" x2="76" y2="224" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>
  <line x1="4" y1="264" x2="76" y2="264" stroke="#0a0d14" stroke-width="1.5" opacity="0.3"/>

  <path d="M 20,35 Q 18,110 22,200 Q 20,270 21,310" stroke="#08090f" stroke-width="0.9" fill="none" opacity="0.5"/>
  <path d="M 46,45 Q 48,120 44,220"                  stroke="#08090f" stroke-width="0.7" fill="none" opacity="0.35"/>
  <path d="M 62,60 Q 64,140 61,230"                  stroke="#08090f" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Dense drips from cap -->
  <path d="M 8,24  Q 7,42 9,60"    stroke="#48c8d8" stroke-width="1.3" fill="none" opacity="0.45"/>
  <path d="M 18,24 Q 17,40 19,56"  stroke="#9ef1ff" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 30,24 Q 29,42 31,58"  stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 44,24 Q 43,40 45,54"  stroke="#9ef1ff" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M 56,24 Q 55,42 57,58"  stroke="#48c8d8" stroke-width="1"   fill="none" opacity="0.4"/>
  <path d="M 67,24 Q 67,40 68,54"  stroke="#48c8d8" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Moss patches near cap -->
  <ellipse cx="24" cy="38" rx="8" ry="4" fill="#48c8d8" opacity="0.1"/>
  <ellipse cx="56" cy="34" rx="6" ry="3" fill="#9ef1ff" opacity="0.08"/>
</svg>
